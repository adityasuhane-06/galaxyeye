seed: 42
device: auto

data:
  train_dir: data/raw/train/train
  val_dir: data/raw/val/val
  test_dir: data/raw/test/test
  image_size: 384
  input_channels: 4
  positive_crop_prob: 0.75
  max_train_samples: 1800
  max_val_samples: 200
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: true

training:
  epochs: 12
  batch_size: 2
  learning_rate: 0.0004
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  amp: true
  grad_clip_norm: 1.0
  log_interval: 20
  checkpoint_dir: outputs/checkpoints_rtx3050
  resume: null

loss:
  name: bce_dice
  bce_weight: 0.4
  dice_weight: 0.6
  pos_weight: 30.0
  smooth: 1.0

model:
  name: unet
  base_channels: 24
  dropout: 0.1

augmentation:
  horizontal_flip: true
  vertical_flip: true
  random_rot90: true

evaluation:
  threshold: 0.5
  save_visualizations: true
  visualization_count: 12
