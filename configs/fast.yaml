seed: 42
device: auto

data:
  train_dir: data/raw/train/train
  val_dir: data/raw/val/val
  test_dir: data/raw/test/test
  image_size: 256
  input_channels: 4
  max_train_samples: 800
  max_val_samples: 120
  num_workers: 2
  pin_memory: true

training:
  epochs: 3
  batch_size: 8
  learning_rate: 0.0005
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  amp: true
  grad_clip_norm: 1.0
  log_interval: 10
  checkpoint_dir: outputs/checkpoints_fast
  resume: null

loss:
  name: bce_dice
  bce_weight: 0.5
  dice_weight: 0.5
  pos_weight: 20.0
  smooth: 1.0

model:
  name: unet
  base_channels: 16
  dropout: 0.05

augmentation:
  horizontal_flip: true
  vertical_flip: true
  random_rot90: true

evaluation:
  threshold: 0.5
  save_visualizations: true
  visualization_count: 8
