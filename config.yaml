seed: 2026
device: auto

data:
  train_dir: data/raw/train/train
  val_dir: data/raw/val/val
  test_dir: data/raw/test/test
  image_size: 384
  multiscale_train_sizes: [384]
  input_channels: 4
  positive_crop_prob: 0.30
  grayscale_prob: 0.35
  sar_speckle_prob: 0.45
  channel_shuffle_prob: 0.15
  brightness_contrast_prob: 0.50
  max_train_samples: 2781
  max_val_samples: 334
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: true

training:
  epochs: 35
  batch_size: 16
  use_data_parallel: true
  device_ids: [0, 1]
  learning_rate: 0.00025
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine
  amp: true
  grad_clip_norm: 1.0
  val_every: 1
  early_stopping_patience: null
  log_interval: 25
  checkpoint_dir: outputs/checkpoints_final_conservative
  resume: null

loss:
  name: bce_dice
  bce_weight: 0.25
  dice_weight: 0.75
  pos_weight: 8.0
  smooth: 1.0

model:
  name: late_fusion_unet
  dropout: 0.30

augmentation:
  horizontal_flip: true
  vertical_flip: true
  random_rot90: true

evaluation:
  threshold: 0.5
  train_tta: false
  save_visualizations: true
  visualization_count: 12
